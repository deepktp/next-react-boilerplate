name: Deploy Production

on:
  push:
    branches: [production]

env:
  DEPLOY_PATH: /var/www/app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build --filter="./packages/*"

      - name: Build API
        run: bun run build --filter="./apps/api"

      - name: Build Web
        run: bun run build --filter="./apps/web"

      - name: Deploy API to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "apps/api/dist/,apps/api/package.json,ecosystem.config.js"
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy Web to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "apps/web/dist/"
          target: "${{ env.DEPLOY_PATH }}/public"

      - name: Restart API via PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            bun install --production
            bun run db:migrate
            pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
            pm2 save
